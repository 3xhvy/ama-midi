# ─── hvy-dev.uk backward compat ───
server {
    listen 443 ssl;
    server_name hvy-dev.uk www.hvy-dev.uk host.hvy-dev.uk client.hvy-dev.uk admin.hvy-dev.uk;

    ssl_certificate     /etc/letsencrypt/live/hvy-dev.uk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hvy-dev.uk/privkey.pem;

    client_max_body_size 100M;
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    location /api/ {
        proxy_pass http://app_backend;
        proxy_set_header Host ohomi.vn;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
    }

    location / {
        return 308 https://ohomi.vn$request_uri;
    }
}
