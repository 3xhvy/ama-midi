# Full /etc/nginx/sites-enabled/default
# Includes ohomi + task + ama-midi (Accept-header SPA/API split)
#
# Install:
#   sudo cp deploy/nginx/default.conf /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# Cert: expand hvy-dev.uk to include ama-midi.hvy-dev.uk if not already:
#   sudo certbot certonly --nginx --cert-name hvy-dev.uk --expand \
#     -d hvy-dev.uk -d www.hvy-dev.uk -d host.hvy-dev.uk -d client.hvy-dev.uk \
#     -d admin.hvy-dev.uk -d task.hvy-dev.uk -d ama-midi.hvy-dev.uk

upstream app_backend {
    server 127.0.0.1:8888;
    keepalive 32;
}

upstream task_backend {
    server 127.0.0.1:9000;
    keepalive 16;
}

# AMA-MIDI (Docker: web :8080, api :3001)
upstream ama_midi_web {
    server 127.0.0.1:8080;
    keepalive 16;
}

upstream ama_midi_api {
    server 127.0.0.1:3001;
    keepalive 16;
}

# Browser page loads → SPA; fetch/XHR → API (fixes direct URL 401 on /projects etc.)
map $http_accept $ama_midi_backend {
    default       ama_midi_api;
    "~*text/html" ama_midi_web;
}

# If landing page is separate service, uncomment + use in ohomi.vn location /
# upstream landing_backend {
#     server 127.0.0.1:7777;
#     keepalive 16;
# }

# ─── HTTP → HTTPS redirect ───
server {
    listen 80 default_server;
    server_name _;
    return 301 https://$host$request_uri;
}

# ─── task.hvy-dev.uk ───
server {
    listen 443 ssl;
    server_name task.hvy-dev.uk;

    ssl_certificate     /etc/letsencrypt/live/hvy-dev.uk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hvy-dev.uk/privkey.pem;

    client_max_body_size 100M;

    location / {
        proxy_pass http://task_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}

# ─── ama-midi.hvy-dev.uk ───
server {
    listen 443 ssl;
    server_name ama-midi.hvy-dev.uk;

    ssl_certificate     /etc/letsencrypt/live/hvy-dev.uk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hvy-dev.uk/privkey.pem;

    client_max_body_size 10M;
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # OAuth token handoff — API redirects here after Google login
    location = /auth/callback {
        proxy_pass http://ama_midi_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Google OAuth — always API (browser sends Accept: text/html)
    location ~ ^/auth/google(/|$) {
        proxy_pass http://ama_midi_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # AI SSE stream — disable buffering; LLM runs can exceed default 60s timeout
    location ~ ^/songs/[^/]+/ai/stream$ {
        proxy_pass http://ama_midi_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        chunked_transfer_encoding off;
    }

    # Shared paths: direct URL / refresh → SPA; fetch → API
    location ~ ^/(auth|songs|users|patterns|health|projects|dashboard|charts)(/|$) {
        proxy_pass http://$ama_midi_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Socket.io — real-time collaboration
    location /socket.io/ {
        proxy_pass http://ama_midi_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
        proxy_buffering off;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://ama_midi_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # React SPA catch-all
    location / {
        proxy_pass http://ama_midi_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    access_log /var/log/nginx/ama-midi-access.log;
    error_log  /var/log/nginx/ama-midi-error.log;
}

# ─── ohomi.vn / www ───
server {
    listen 443 ssl;
    server_name ohomi.vn www.ohomi.vn;

    ssl_certificate     /etc/letsencrypt/live/ohomi.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ohomi.vn/privkey.pem;

    client_max_body_size 100M;
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # API routes (must stay above catch-all /)
    location ^~ /api/ {
        proxy_pass http://app_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
    }

    location ^~ /host/api/ {
        proxy_pass http://app_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
    }

    location ^~ /client/api/ {
        proxy_pass http://app_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
    }

    location ^~ /admin/api/ {
        proxy_pass http://app_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://app_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header Access-Control-Allow-Origin "*";
    }

    location = / {
        return 302 /landing;
    }

    location / {
        proxy_pass http://app_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}

