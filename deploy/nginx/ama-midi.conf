# AMA-MIDI — append to /etc/nginx/sites-enabled/default
# Domain: ama-midi.hvy-dev.uk (same hvy-dev.uk cert as task.hvy-dev.uk)
#
# Docker binds locally only:
#   web → 127.0.0.1:8080
#   api → 127.0.0.1:3001
#
# IMPORTANT: Add the map block below in the http {} context (once per nginx config),
# e.g. near the top of default, before any server {} blocks.
#
# map $http_accept $ama_midi_backend {
#     default       ama_midi_api;
#     "~*text/html" ama_midi_web;
# }
#
# After editing:
#   sudo nginx -t && sudo systemctl reload nginx

upstream ama_midi_web {
    server 127.0.0.1:8080;
    keepalive 16;
}

upstream ama_midi_api {
    server 127.0.0.1:3001;
    keepalive 16;
}

# ─── ama-midi.hvy-dev.uk ───
server {
    listen 443 ssl;
    server_name ama-midi.hvy-dev.uk;

    ssl_certificate     /etc/letsencrypt/live/hvy-dev.uk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hvy-dev.uk/privkey.pem;

    client_max_body_size 10M;
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # OAuth token handoff — API redirects here after Google login
    location = /auth/callback {
        proxy_pass http://ama_midi_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Google OAuth — always API (browser navigation uses Accept: text/html)
    location ~ ^/auth/google(/|$) {
        proxy_pass http://ama_midi_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # AI SSE stream — disable buffering; LLM runs can exceed default 60s timeout
    location ~ ^/songs/[^/]+/ai/stream$ {
        proxy_pass http://ama_midi_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        chunked_transfer_encoding off;
    }

    # Shared URL paths: SPA page loads vs JSON API (fetch/XHR)
    # Browser direct URL / refresh → Accept includes text/html → SPA
    # apiClient fetch → Accept */* or application/json → API
    location ~ ^/(auth|songs|users|patterns|health|projects|dashboard|charts)(/|$) {
        proxy_pass http://$ama_midi_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Socket.io — real-time collaboration
    location /socket.io/ {
        proxy_pass http://ama_midi_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
        proxy_buffering off;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://ama_midi_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # React SPA
    location / {
        proxy_pass http://ama_midi_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    access_log /var/log/nginx/ama-midi-access.log;
    error_log  /var/log/nginx/ama-midi-error.log;
}
