name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  GITHUB_OWNER: ${{ github.repository_owner }}

jobs:
  build-api:
    runs-on: ubuntu-latest
    environment: AMA-MIDI
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/api/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.REGISTRY }}/${{ env.GITHUB_OWNER }}/ama-midi-api:latest
            ${{ env.REGISTRY }}/${{ env.GITHUB_OWNER }}/ama-midi-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-web:
    runs-on: ubuntu-latest
    environment: AMA-MIDI
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/web/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.REGISTRY }}/${{ env.GITHUB_OWNER }}/ama-midi-web:latest
            ${{ env.REGISTRY }}/${{ env.GITHUB_OWNER }}/ama-midi-web:${{ github.sha }}
          build-args: |
            VITE_API_URL=
            VITE_WS_URL=${{ vars.APP_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: [build-api, build-web]
    runs-on: ubuntu-latest
    environment: AMA-MIDI

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VM_SSH_KEY }}" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ vars.VM_SSH_PORT }} -H ${{ vars.VM_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to VPS
        run: |
          printf '%s\n' \
            'set -e' \
            'cd /opt/ama-midi' \
            'echo "Pulling latest images..."' \
            'docker compose -f docker-compose.prod.yml pull' \
            'echo "Starting containers..."' \
            'docker compose -f docker-compose.prod.yml up -d' \
            'echo "Cleaning old images..."' \
            'docker image prune -af --filter "until=72h"' \
            'echo "Waiting for API to become healthy..."' \
            'TIMEOUT_SECONDS=180' \
            'SLEEP_SECONDS=5' \
            'ELAPSED=0' \
            'while true; do' \
            '  HEALTH=$(docker inspect --format="{{.State.Health.Status}}" ama-midi-api 2>/dev/null || echo "unknown")' \
            '  if [ "$HEALTH" = "healthy" ]; then' \
            '    echo "Deployment successful!"' \
            '    exit 0' \
            '  fi' \
            '  if [ "$ELAPSED" -ge "$TIMEOUT_SECONDS" ]; then' \
            '    echo "Container unhealthy: $HEALTH"' \
            '    docker compose -f docker-compose.prod.yml logs api' \
            '    exit 1' \
            '  fi' \
            '  sleep "$SLEEP_SECONDS"' \
            '  ELAPSED=$((ELAPSED + SLEEP_SECONDS))' \
            'done' \
            | ssh -p ${{ vars.VM_SSH_PORT }} -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
                ${{ vars.VM_USERNAME }}@${{ vars.VM_HOST }} 'bash -s'
