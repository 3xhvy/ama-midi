# Host nginx site config — install on APP VPS:
#   sudo cp deploy/nginx/ama-midi.conf /etc/nginx/sites-available/ama-midi
#   sudo ln -sf /etc/nginx/sites-available/ama-midi /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Replace ama-midi.example.com with your domain before enabling.

upstream ama_midi_web {
    server 127.0.0.1:8080;
    keepalive 8;
}

upstream ama_midi_api {
    server 127.0.0.1:3001;
    keepalive 8;
}

server {
    listen 80;
    server_name ama-midi.example.com;

    client_max_body_size 10M;

    # NestJS API routes
    location ~ ^/(auth|songs|users|patterns|health|projects)(/|$) {
        proxy_pass http://ama_midi_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Socket.io — real-time collaboration
    location /socket.io/ {
        proxy_pass http://ama_midi_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # React SPA (static files from web container)
    location / {
        proxy_pass http://ama_midi_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    access_log /var/log/nginx/ama-midi-access.log;
    error_log  /var/log/nginx/ama-midi-error.log;
}
