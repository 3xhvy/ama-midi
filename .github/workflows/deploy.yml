name: Deploy to VM

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  GITHUB_OWNER: ${{ github.repository_owner }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: AMA-MIDI
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Notify - Build Started
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          COMMIT_SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
          COMMIT_URL="https://github.com/${{ github.repository }}/commit/${{ github.sha }}"
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          MESSAGE=$(cat <<EOF
          🚀 *AMA-MIDI — Pipeline Started*

          📦 *Job:* Build & Push Docker Images (api + web)
          🔀 *Branch:* \`${{ github.ref_name }}\`
          📝 *Commit:* [\`${COMMIT_SHORT}\`](${COMMIT_URL})
          👤 *By:* ${{ github.actor }}
          🔗 [View Pipeline](${RUN_URL})
          EOF
          )
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d parse_mode="Markdown" \
            -d disable_web_page_preview=true \
            -d text="${MESSAGE}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/api/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.REGISTRY }}/${{ env.GITHUB_OWNER }}/ama-midi-api:latest
            ${{ env.REGISTRY }}/${{ env.GITHUB_OWNER }}/ama-midi-api:${{ github.sha }}
          cache-from: type=gha,scope=ama-midi-api
          cache-to: type=gha,mode=max,scope=ama-midi-api

      - name: Build and push Web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/web/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.REGISTRY }}/${{ env.GITHUB_OWNER }}/ama-midi-web:latest
            ${{ env.REGISTRY }}/${{ env.GITHUB_OWNER }}/ama-midi-web:${{ github.sha }}
          build-args: |
            VITE_API_URL=
            VITE_WS_URL=${{ vars.APP_URL }}
          cache-from: type=gha,scope=ama-midi-web
          cache-to: type=gha,mode=max,scope=ama-midi-web

      - name: Notify - Build Result
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            STATUS="✅ Build Successful"
          else
            STATUS="❌ Build Failed"
          fi
          MESSAGE=$(cat <<EOF
          📦 *AMA-MIDI — Build & Push*

          *Result:* ${STATUS}
          🏷️ *Images:*
          \`${{ env.REGISTRY }}/${{ env.GITHUB_OWNER }}/ama-midi-api:latest\`
          \`${{ env.REGISTRY }}/${{ env.GITHUB_OWNER }}/ama-midi-web:latest\`
          EOF
          )
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d parse_mode="Markdown" \
            -d disable_web_page_preview=true \
            -d text="${MESSAGE}"

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: AMA-MIDI
    env:
      VM_HOST: ${{ vars.VM_HOST }}
      VM_USERNAME: ${{ vars.VM_USERNAME }}
      VM_SSH_PORT: ${{ vars.VM_SSH_PORT }}

    steps:
      - name: Notify - Deploy Started
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          MESSAGE=$(cat <<EOF
          🖥️ *AMA-MIDI — Deploying to VM*

          ⏳ *Status:* Connecting to server...
          🔄 *Steps:* Pull images → Start containers → Health check
          EOF
          )
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d parse_mode="Markdown" \
            -d disable_web_page_preview=true \
            -d text="${MESSAGE}"

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VM_SSH_KEY }}" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          PORT="${VM_SSH_PORT:-24700}"
          ssh-keyscan -p "$PORT" -H "$VM_HOST" >> ~/.ssh/known_hosts

      - name: Deploy to VM
        env:
          DEPLOY_SHA: ${{ github.sha }}
        run: |
          printf '%s\n' \
            'set -e' \
            'cd /opt/amanotes' \
            "export IMAGE_TAG=${DEPLOY_SHA}" \
            'echo "Deploying IMAGE_TAG=${IMAGE_TAG}"' \
            'echo "Pulling images for this commit..."' \
            'docker compose -f docker-compose.prod.yml pull' \
            'echo "Running database migrations..."' \
            'docker compose -f docker-compose.prod.yml run --rm --entrypoint prisma api migrate deploy' \
            'echo "Starting containers (force recreate)..."' \
            'docker compose -f docker-compose.prod.yml up -d --force-recreate --remove-orphans' \
            'echo "Running containers:"' \
            'docker inspect --format="  api: {{.Config.Image}}" ama-midi-api' \
            'docker inspect --format="  web: {{.Config.Image}}" ama-midi-web' \
            'echo "Cleaning old images..."' \
            'docker image prune -af --filter "until=72h"' \
            'echo "Waiting for API to become healthy..."' \
            'TIMEOUT_SECONDS=180' \
            'SLEEP_SECONDS=5' \
            'ELAPSED=0' \
            'while true; do' \
            '  HEALTH=$(docker inspect --format="{{.State.Health.Status}}" ama-midi-api 2>/dev/null || echo "unknown")' \
            '  if [ "$HEALTH" = "healthy" ]; then' \
            '    echo "Deployment successful!"' \
            '    exit 0' \
            '  fi' \
            '  if [ "$ELAPSED" -ge "$TIMEOUT_SECONDS" ]; then' \
            '    echo "Container unhealthy: $HEALTH"' \
            '    docker compose -f docker-compose.prod.yml logs api' \
            '    exit 1' \
            '  fi' \
            '  sleep "$SLEEP_SECONDS"' \
            '  ELAPSED=$((ELAPSED + SLEEP_SECONDS))' \
            'done' \
            | ssh -p "${VM_SSH_PORT:-24700}" -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
                "${VM_USERNAME}@${VM_HOST}" 'bash -s'

      - name: Notify - Deploy Result
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          COMMIT_SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
          COMMIT_URL="https://github.com/${{ github.repository }}/commit/${{ github.sha }}"
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          if [ "${{ job.status }}" == "success" ]; then
            STATUS="✅ Deploy Successful"
            EXTRA="🌐 *Site:* [ama-midi.hvy-dev.uk](https://ama-midi.hvy-dev.uk)"
          else
            STATUS="❌ Deploy Failed"
            EXTRA="⚠️ Check [pipeline logs](${RUN_URL}) for details"
          fi

          MESSAGE=$(cat <<EOF
          🏁 *AMA-MIDI — Deploy Complete*

          *Result:* ${STATUS}
          🔀 *Branch:* \`${{ github.ref_name }}\`
          📝 *Commit:* [\`${COMMIT_SHORT}\`](${COMMIT_URL})
          👤 *By:* ${{ github.actor }}
          ${EXTRA}
          🔗 [View Pipeline](${RUN_URL})
          EOF
          )
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d parse_mode="Markdown" \
            -d disable_web_page_preview=true \
            -d text="${MESSAGE}"
